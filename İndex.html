<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.İ.B | MERKEZİ TERMİNAL</title>
    <style>
        :root {
            --bg: #050505;
            --gray-dark: #0c0c0c;
            --gold: #d4af37;
            --text-dim: #888;
            --border: #222;
        }

        body {
            background: var(--bg);
            color: var(--text-dim);
            font-family: 'Consolas', monospace;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .hidden { display: none !important; }

        /* GİRİŞ EKRANI */
        #landing-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #111 0%, #050505 100%);
        }

        .login-box {
            background: var(--gray-dark);
            padding: 40px;
            border: 1px solid var(--border);
            text-align: center;
            border-radius: 4px;
        }

        input {
            background: #000;
            border: 1px solid var(--border);
            color: var(--gold);
            padding: 12px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            width: 220px;
        }

        button {
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--gold); color: #000; }

        /* PANEL */
        #main-panel {
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .panel-header {
            background: #000;
            padding: 10px 20px;
            border-bottom: 1px solid var(--gold);
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 10px;
            padding: 10px;
        }

        .card {
            background: var(--gray-dark);
            border: 1px solid var(--border);
            padding: 15px;
        }

        .card-title { color: var(--gold); font-size: 11px; margin-bottom: 10px; border-bottom: 1px solid #333; }
        
        .log-line { font-size: 10px; color: #44ff44; margin-bottom: 5px; }

        @media (max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div id="landing-page">
        <div style="color: var(--gold); letter-spacing: 5px; margin-bottom: 20px;">S.İ.B MERKEZİ</div>
        <div class="login-box">
            <input type="password" id="key" placeholder="ERİŞİM KODU">
            <br>
            <button onclick="check()">SİSTEMİ AÇ</button>
        </div>
    </div>

    <div id="main-panel" class="hidden">
        <div class="panel-header">
            <span style="color: var(--gold);">● S.İ.B TERMİNAL V1.0</span>
            <span id="timer">00:00:00</span>
        </div>
        <div class="grid-layout">
            <div class="card">
                <div class="card-title">BİRİMLER</div>
                <div id="units"></div>
            </div>
            <div class="card">
                <div class="card-title">CANLI VERİ AKIŞI</div>
                <div id="logs"></div>
            </div>
            <div class="card">
                <div class="card-title">GÜVENLİK</div>
                <div id="security"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());

        function check() {
            const k = document.getElementById('key').value;
            if(k === "1923") {
                document.getElementById('landing-page').style.display = "none";
                document.getElementById('main-panel').classList.remove('hidden');
                run();
            } else { alert("YETKİSİZ GİRİŞ!"); }
        }

        function run() {
            setInterval(() => {
                document.getElementById('timer').innerText = new Date().toLocaleTimeString();
            }, 1000);

            const u = ["İSTİHBARAT", "SİBER SAVUNMA", "ANALİZ"];
            document.getElementById('units').innerHTML = u.map(x => `<div style="margin-bottom:5px;">${x} <span style="color:green;float:right;">ONLINE</span></div>`).join('');
            
            document.getElementById('security').innerHTML = `<div>KALKAN: %100</div><div>TEHDİT: YOK</div>`;
            
            const l = ["> Bağlantı güvenli.", "> Node-27 aktif.", "> Gaziantep Şifreleme aktif."];
            setInterval(() => {
                const div = document.createElement('div');
                div.className = "log-line";
                div.innerText = l[Math.floor(Math.random()*l.length)];
                document.getElementById('logs').prepend(div);
            }, 3000);
        }
    </script>
</body>
  </html>
