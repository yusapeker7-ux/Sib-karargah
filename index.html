<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="theme-color" content="#14130f" />
<title>Anonim Mesaj</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #14130f;
    --surface: #1e1c17;
    --surface-2: #262319;
    --text: #ede8dd;
    --text-muted: #8c8576;
    --accent: #c97a3d;
    --border: #3a372e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    min-height: 100dvh;
  }
  button, input { font: inherit; }

  /* Landing */
  .landing {
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .landing__seal {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px dashed var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 20px; margin-bottom: 18px;
  }
  .landing__title { font-family: 'IBM Plex Mono', monospace; font-size: 28px; letter-spacing: .04em; margin: 0 0 8px; }
  .landing__sub { color: var(--text-muted); max-width: 320px; margin: 0 0 28px; line-height: 1.5; font-size: 15px; }
  .landing__divider { display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 13px; margin: 22px 0; width: 100%; max-width: 280px; }
  .landing__divider::before, .landing__divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .landing__join { display: flex; gap: 8px; width: 100%; max-width: 280px; }
  .landing__error { color: var(--accent); font-size: 13px; margin-top: 10px; }
  .landing__footnote { color: var(--text-muted); font-size: 12px; margin-top: 36px; max-width: 280px; line-height: 1.5; }

  /* Shared controls */
  .btn { font-weight: 600; font-size: 15px; border-radius: 10px; padding: 13px 20px; cursor: pointer; border: 1px solid transparent; transition: transform .15s ease, opacity .15s ease; }
  .btn:active { transform: scale(.97); }
  .btn--primary { background: var(--accent); color: #1c150d; border: none; width: 100%; max-width: 280px; }
  .btn--ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .input { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 13px 14px; font-size: 15px; outline: none; flex: 1; min-width: 0; }
  .input:focus { border-color: var(--accent); }
  .input:disabled { opacity: .5; }
  .input--code { font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: .12em; text-align: center; }

  /* Status (waiting / connecting) */
  .status { min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 24px; text-align: center; }
  .status__spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent); animation: spin .9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status__text { color: var(--text-muted); font-size: 14px; max-width: 280px; }

  /* Code chip */
  .code-chip { background: var(--surface); border: 1px dashed var(--accent); border-radius: 8px; padding: 8px 16px; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; color: var(--text); }
  .code-chip span { font-family: 'IBM Plex Mono', monospace; letter-spacing: .15em; font-size: 16px; }
  .code-chip small { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }

  /* Room */
  .room { min-height: 100dvh; display: flex; flex-direction: column; }
  .room__header { display: flex; align-items: center; justify-content: center; padding: 16px; border-bottom: 1px solid var(--border); position: relative; }
  .room__back { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 8px; }
  .room__messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .room__empty { color: var(--text-muted); text-align: center; margin-top: 40px; font-size: 14px; padding: 0 24px; }
  .bubble { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
  .bubble p { margin: 0; }
  .bubble--mine { align-self: flex-end; background: var(--accent); color: #1c150d; border-bottom-right-radius: 4px; }
  .bubble--other { align-self: flex-start; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .system-msg { align-self: center; color: var(--text-muted); font-size: 12px; margin: 4px 0; }
  .room__compose { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); background: var(--bg); }
  .room__compose .btn { width: auto; padding: 13px 18px; }

  @media (max-width: 420px) { .landing__title { font-size: 24px; } }
  [hidden] { display: none !important; }
</style>
</head>
<body>

  <main id="landing" class="landing">
    <div class="landing__seal">✦</div>
    <h1 class="landing__title">Anonim Mesaj</h1>
    <p class="landing__sub">Kimlik yok, kayıt yok, sunucuda saklanan mesaj yok. Bir oda aç, kodu paylaş, doğrudan konuş.</p>

    <button id="createBtn" class="btn btn--primary">Yeni oda oluştur</button>

    <div class="landing__divider"><span>ya da</span></div>

    <form id="joinForm" class="landing__join">
      <input id="joinInput" class="input input--code" placeholder="ODA KODU" maxlength="8" autocomplete="off" />
      <button class="btn btn--ghost" type="submit">Katıl</button>
    </form>
    <p id="landingError" class="landing__error" hidden></p>

    <p class="landing__footnote">Mesajlar hiçbir sunucuda tutulmaz, doğrudan iki taraf arasında gider. Bağlanmak için ikiniz de aynı anda sayfayı açık tutmalısınız.</p>
  </main>

  <main id="status" class="status" hidden>
    <div class="status__spinner"></div>
    <p id="statusText" class="status__text">Hazırlanıyor...</p>
    <div id="statusCode" class="code-chip" hidden>
      <span id="statusCodeText"></span>
      <small>kodu kopyala</small>
    </div>
    <button id="statusCancel" class="btn btn--ghost">Vazgeç</button>
  </main>

  <main id="room" class="room" hidden>
    <header class="room__header">
      <button id="roomBack" class="room__back" aria-label="Çık">←</button>
      <div id="roomCode" class="code-chip">
        <span id="roomCodeText"></span>
        <small id="roomStatusText">bağlandı</small>
      </div>
    </header>
    <div id="messages" class="room__messages"></div>
    <form id="composeForm" class="room__compose">
      <input id="composeInput" class="input" placeholder="Mesaj yaz..." maxlength="2000" autocomplete="off" />
      <button id="sendBtn" class="btn btn--primary" type="submit">Gönder</button>
    </form>
  </main>

  <script src="https://unpkg.com/peerjs@1/dist/peerjs.min.js"></script>
  <script>
    var PREFIX = 'anonimsohbet-';
    var ICE = { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:global.stun.twilio.com:3478' }
    ]};

    var peer = null, conn = null, myCode = '';

    var screens = {
      landing: document.getElementById('landing'),
      status: document.getElementById('status'),
      room: document.getElementById('room')
    };
    function showScreen(name) {
      for (var k in screens) screens[k].hidden = (k !== name);
    }

    function setStatus(text, showCode) {
      document.getElementById('statusText').textContent = text;
      var codeEl = document.getElementById('statusCode');
      if (showCode) {
        codeEl.hidden = false;
        document.getElementById('statusCodeText').textContent = myCode;
      } else {
        codeEl.hidden = true;
      }
    }

    function showError(msg) {
      var el = document.getElementById('landingError');
      el.textContent = msg;
      el.hidden = false;
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(function () { fallbackCopy(text); });
      } else {
        fallbackCopy(text);
      }
    }
    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }

    function generateCode() {
      var chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789', code = '';
      for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }

    function teardownPeer() {
      if (conn) { try { conn.close(); } catch (e) {} conn = null; }
      if (peer) { try { peer.destroy(); } catch (e) {} peer = null; }
    }

    function goLanding() {
      if (conn && conn.open) { try { conn.send({ type: 'leave' }); } catch (e) {} }
      teardownPeer();
      document.getElementById('joinInput').value = '';
      document.getElementById('landingError').hidden = true;
      document.getElementById('messages').innerHTML = '';
      document.getElementById('composeInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('roomStatusText').textContent = 'bağlandı';
      showScreen('landing');
    }

    function addMessage(text, mine) {
      var wrap = document.getElementById('messages');
      var empty = wrap.querySelector('.room__empty');
      if (empty) empty.remove();
      var div = document.createElement('div');
      div.className = 'bubble ' + (mine ? 'bubble--mine' : 'bubble--other');
      var p = document.createElement('p');
      p.textContent = text;
      div.appendChild(p);
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
    }

    function addSystemMessage(text) {
      var wrap = document.getElementById('messages');
      var div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
    }

    function enterRoom(code) {
      myCode = code;
      document.getElementById('roomCodeText').textContent = code;
      document.getElementById('roomStatusText').textContent = 'bağlandı';
      document.getElementById('messages').innerHTML = '<p class="room__empty">Henüz mesaj yok. İlk mesajı sen yaz.</p>';
      showScreen('room');
    }

    function wireConnection(connection, codeForDisplay) {
      conn = connection;
      conn.on('open', function () { enterRoom(codeForDisplay); });
      conn.on('data', function (data) {
        if (!data || typeof data !== 'object') return;
        if (data.type === 'msg' && typeof data.text === 'string') {
          addMessage(data.text, false);
        } else if (data.type === 'leave') {
          addSystemMessage('Karşı taraf odadan çıktı.');
          document.getElementById('roomStatusText').textContent = 'ayrıldı';
        }
      });
      conn.on('close', function () {
        addSystemMessage('Bağlantı koptu.');
        document.getElementById('roomStatusText').textContent = 'koptu';
        document.getElementById('composeInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
      });
    }

    // Oda oluştur (host)
    document.getElementById('createBtn').addEventListener('click', function () {
      var code = generateCode();
      teardownPeer();
      showScreen('status');
      setStatus('Oda hazırlanıyor...', false);

      peer = new Peer(PREFIX + code, { debug: 1, config: ICE });

      peer.on('open', function () { setStatus('Karşı taraf bekleniyor', true); });
      peer.on('connection', function (connection) { wireConnection(connection, code); });
      peer.on('error', function (err) {
        if (err && err.type === 'unavailable-id') {
          setStatus('Kod meşgul, yeni kod deneniyor...', false);
          teardownPeer();
          setTimeout(function () { document.getElementById('createBtn').click(); }, 400);
        } else {
          setStatus('Bağlantı kurulamadı. Vazgeç ve tekrar dene.', false);
        }
      });
    });

    document.getElementById('statusCode').addEventListener('click', function () { copyText(myCode); });
    document.getElementById('roomCode').addEventListener('click', function () { copyText(myCode); });
    document.getElementById('statusCancel').addEventListener('click', goLanding);
    document.getElementById('roomBack').addEventListener('click', goLanding);

    // Katıl
    document.getElementById('joinForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var raw = document.getElementById('joinInput').value.trim().toUpperCase();
      if (raw.length < 4) { showError('Kod en az 4 karakter olmalı.'); return; }
      document.getElementById('landingError').hidden = true;

      teardownPeer();
      showScreen('status');
      setStatus('Bağlanılıyor: ' + raw, false);

      peer = new Peer(undefined, { debug: 1, config: ICE });

      peer.on('open', function () {
        var connection = peer.connect(PREFIX + raw, { reliable: true });
        var settled = false;

        var failTimer = setTimeout(function () {
          if (!settled) { settled = true; setStatus('Bu kodla bir oda bulunamadı. Kodu kontrol et.', false); }
        }, 8000);

        connection.on('open', function () {
          settled = true; clearTimeout(failTimer);
          wireConnection(connection, raw);
        });
        connection.on('error', function () {
          if (!settled) { settled = true; clearTimeout(failTimer); setStatus('Bu kodla bir oda bulunamadı. Kodu kontrol et.', false); }
        });
      });

      peer.on('error', function () { setStatus('Bağlantı kurulamadı. Vazgeç ve tekrar dene.', false); });
    });

    // Mesaj gönder
    document.getElementById('composeForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var input = document.getElementById('composeInput');
      var text = input.value.trim();
      if (!text || !conn || !conn.open) return;
      conn.send({ type: 'msg', text: text });
      addMessage(text, true);
      input.value = '';
    });

    window.addEventListener('pagehide', teardownPeer);
  </script>
</body>
</html>
